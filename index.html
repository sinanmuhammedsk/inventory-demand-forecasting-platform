<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walmart ✵ Enterprise BI Analytics & Forecasting</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Application Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <h2>Walmart <span class="spark">✵</span></h2>
                <div class="sub-brand">Inventory Analytics</div>
                <span class="badge">Enterprise BI</span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-page="dashboard">
                    <i class="bi bi-grid-1x2-fill"></i> Executive Dashboard
                </button>
                <button class="nav-item" data-page="analytics">
                    <i class="bi bi-bar-chart-line-fill"></i> Market Analytics
                </button>
                <button class="nav-item" data-page="forecasting">
                    <i class="bi bi-graph-up-arrow"></i> Demand Forecasting
                </button>
                <button class="nav-item" data-page="inventory">
                    <i class="bi bi-box-seam-fill"></i> Stock Optimization
                </button>
                <button class="nav-item" data-page="reports">
                    <i class="bi bi-file-earmark-medical-fill"></i> System Audit Logs
                </button>
                <button class="nav-item" data-page="about">
                    <i class="bi bi-info-circle-fill"></i> About System
                </button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="system-status">
                    <span class="status-indicator"></span>
                    <span class="status-text">DB Mode: SQLITE (Web Local)</span>
                </div>
                <div class="ver-text">
                    Demand Forecasting System v1.0.0<br>
                    Optimized Client-Side Engine
                </div>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Global Header -->
            <header class="app-header">
                <div class="header-left">
                    <h1 id="page-title">Executive Dashboard</h1>
                    <p id="page-subtitle">Real-time retail sales analytics, inventory KPIs, and global demand trends</p>
                </div>
                <div class="header-right">
                    <div class="user-profile">
                        <i class="bi bi-person-fill-gear"></i>
                        <span class="user-name">admin (System Portfolio)</span>
                    </div>
                </div>
            </header>
            
            <!-- Dynamic Content Slot -->
            <div id="content-slot" class="content-slot">
                <!-- Page contents injected here dynamically -->
            </div>
            
        </main>
        
    </div>

    <!-- Spinner Loader -->
    <div id="global-loader" class="loader-overlay">
        <div class="spinner-box">
            <div class="circle-border">
                <div class="circle-core"></div>
            </div>
            <div class="loader-text">Loading Analytical Dataset...</div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
